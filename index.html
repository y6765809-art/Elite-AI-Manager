<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite AI Enterprise - Direct Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #2d1b0d; --cream: #f9f7f2; }
        body, html { margin: 0; height: 100vh; width: 100vw; overflow: hidden; background: var(--cream); font-family: 'Segoe UI', sans-serif; }
        .sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 300px; background: var(--dark); color: white; padding: 25px; z-index: 50; }
        .main { margin-right: 300px; height: 100vh; display: flex; flex-direction: column; }
        .header { height: 80px; background: white; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .chat { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .input-p { background: white; border-top: 1px solid #eee; padding: 20px 40px; }
        .msg { padding: 15px 25px; border-radius: 15px; max-width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .msg-bot { background: #f1ede4; border-right: 5px solid var(--dark); align-self: flex-start; }
        .msg-user { background: white; border-right: 5px solid var(--gold); align-self: flex-end; }
        .gold-btn { background: var(--gold); color: white; padding: 12px 35px; border-radius: 10px; font-weight: bold; transition: 0.3s; cursor: pointer; border: none; }
        .gold-btn:hover { background: #b38f48; transform: translateY(-2px); }
    </style>
</head>
<body class="flex">

    <aside class="sidebar shadow-2xl">
        <div class="text-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-black text-gold" style="color:var(--gold)">Elite BMS</h1>
            <p class="text-[9px] uppercase tracking-[4px] opacity-40">Direct API Master</p>
        </div>
        <nav class="space-y-4">
            <button onclick="location.reload()" class="w-full text-right p-3 rounded-lg hover:bg-white/5 flex items-center gap-3">
                <i class="fas fa-plus-circle text-gold"></i> שיחה חדשה
            </button>
            <div class="p-4 bg-black/20 rounded-xl mt-10">
                <p class="text-[10px] text-gold font-bold mb-2">סטטוס חיבור:</p>
                <div id="connStatus" class="text-xs text-gray-400">ממתין לפעולה...</div>
            </div>
        </nav>
    </aside>

    <div class="main">
        <header class="header shadow-sm">
            <div>
                <h2 class="text-xl font-bold">לוח בקרה חכם</h2>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Master Intelligence Mode</p>
            </div>
            <div class="flex items-center gap-4 bg-gray-50 p-2 px-5 rounded-2xl border-2 shadow-inner">
                <span class="text-xs font-bold text-gray-400">API KEY:</span>
                <input type="password" id="apiKey" class="text-sm bg-transparent outline-none w-72" placeholder="sk-ant-...">
            </div>
        </header>

        <div id="chatBox" class="chat">
            <div class="msg msg-bot">
                <b>שלום יוחנן,</b><br>
                המערכת מוכנה. כדי לעבוד ללא תקלות, וודא שתוסף ה-CORS בדפדפן מופעל.<br>
                הכנס את המפתח למעלה ושלח הודעה לבדיקת החיבור.
            </div>
        </div>

        <div class="input-p">
            <div class="max-w-5xl mx-auto flex gap-5">
                <textarea id="uText" class="flex-1 p-4 border-2 border-gray-100 rounded-xl focus:border-gold outline-none resize-none shadow-sm" rows="1" placeholder="כתוב פקודה..."></textarea>
                <button onclick="sendDirect()" id="sendBtn" class="gold-btn flex items-center gap-2">
                    <span>שלח</span> <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        async function sendDirect() {
            const u = document.getElementById('uText'), k = document.getElementById('apiKey').value || localStorage.getItem('e_k');
            const btn = document.getElementById('sendBtn'), status = document.getElementById('connStatus');

            if(!u.value.trim() || !k) return alert("הזן הודעה ומפתח API");
            
            localStorage.setItem('e_k', k);
            const userMsg = u.value;
            add('user', userMsg);
            u.value = "";
            btn.disabled = true;
            status.innerHTML = "<span class='text-yellow-500'>מתחבר לשרת...</span>";

            try {
                // נסיון שליחה ישיר (עובד עם תוסף Allow CORS)
                const res = await fetch("https://api.anthropic.com/v1/messages", {
                    method: 'POST',
                    headers: { 
                        'x-api-key': k, 
                        'anthropic-version': '2023-06-01', 
                        'content-type': 'application/json',
                        'dangerously-allow-browser': 'true' 
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 4000,
                        messages: [{ role: "user", content: userMsg }]
                    })
                });

                const data = await res.json();
                
                if(data.error) {
                    add('bot', "שגיאת API: " + data.error.message);
                    status.innerHTML = "<span class='text-red-500'>שגיאת מפתח/תקציב</span>";
                } else {
                    add('bot', data.content[0].text);
                    status.innerHTML = "<span class='text-green-500'>מחובר ותקין</span>";
                }
            } catch (e) {
                // אם נכשל ישירות, מנסה דרך ה-Proxy כגיבוי
                status.innerHTML = "<span class='text-blue-400'>מנסה מעקף Proxy...</span>";
                try {
                    const resProxy = await fetch("https://cors-anywhere.herokuapp.com/https://api.anthropic.com/v1/messages", {
                        method: 'POST',
                        headers: { 'x-api-key': k, 'anthropic-version': '2023-06-01', 'content-type': 'application/json' },
                        body: JSON.stringify({ model: "claude-3-5-sonnet-20240620", max_tokens: 4000, messages: [{ role: "user", content: userMsg }] })
                    });
                    const dProxy = await resProxy.json();
                    add('bot', dProxy.content[0].text);
                    status.innerHTML = "<span class='text-green-500'>מחובר דרך Proxy</span>";
                } catch (err) {
                    add('bot', "חסימת CORS. פתרון: הפעל את תוסף 'Allow CORS' בכרום.");
                    status.innerHTML = "<span class='text-red-500'>חסימת דפדפן</span>";
                }
            } finally { btn.disabled = false; }
        }

        function add(role, text) {
            const b = document.getElementById('chatBox'), d = document.createElement('div');
            d.className = `msg ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
            d.innerText = text;
            b.appendChild(d);
            b.scrollTo({ top: b.scrollHeight, behavior: 'smooth' });
        }

        window.onload = () => { document.getElementById('apiKey').value = localStorage.getItem('e_k') || ""; };
    </script>
</body>
</html>
