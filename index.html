<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite AI Enterprise - Direct Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #2d1b0d; --cream: #f9f7f2; }
        body, html { margin: 0; height: 100vh; width: 100vw; overflow: hidden; background: var(--cream); font-family: 'Segoe UI', sans-serif; }
        .sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 300px; background: var(--dark); color: white; padding: 25px; z-index: 50; }
        .main { margin-right: 300px; height: 100vh; display: flex; flex-direction: column; }
        .header { height: 80px; background: white; border-bottom: 4px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .chat-box { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .input-panel { background: white; border-top: 1px solid #eee; padding: 20px 40px; }
        .msg { padding: 15px 25px; border-radius: 15px; max-width: 80%; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 16px; }
        .msg-bot { background: #f1ede4; border-right: 5px solid var(--dark); align-self: flex-start; }
        .msg-user { background: white; border-right: 5px solid var(--gold); align-self: flex-end; }
        .gold-btn { background: var(--gold); color: white; padding: 12px 35px; border-radius: 10px; font-weight: bold; cursor: pointer; border: none; transition: 0.3s; }
        .gold-btn:hover { background: #b38f48; transform: translateY(-2px); }
    </style>
</head>
<body class="flex">

    <aside class="sidebar shadow-2xl">
        <div class="text-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-black text-gold" style="color:var(--gold)">Elite BMS</h1>
            <p class="text-[9px] uppercase tracking-[4px] opacity-40">Direct Pro v8</p>
        </div>
        <div class="p-4 bg-black/20 rounded-xl mb-6">
            <p class="text-[10px] text-gold font-bold mb-2">סטטוס מערכת:</p>
            <div id="status" class="text-xs text-gray-400">מוכן לעבודה</div>
        </div>
        <button onclick="location.reload()" class="w-full text-right p-3 rounded-lg hover:bg-white/5 flex items-center gap-3">
            <i class="fas fa-sync-alt text-gold"></i> רענן מערכת
        </button>
    </aside>

    <div class="main">
        <header class="header shadow-sm">
            <div>
                <h2 class="text-xl font-bold">לוח בקרה חכם</h2>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Master Intelligence</p>
            </div>
            <div class="flex items-center gap-4 bg-gray-50 p-2 px-5 rounded-2xl border-2">
                <span class="text-xs font-bold text-gray-400">API KEY:</span>
                <input type="password" id="apiKey" class="text-sm bg-transparent outline-none w-72" placeholder="sk-ant-...">
            </div>
        </header>

        <div id="chatBox" class="chat-box">
            <div class="msg msg-bot">
                <b>שלום יוחנן,</b><br>
                המערכת מוגדרת כעת לעבודה **ישירה** מול קלוד. <br>
                וודא שתוסף ה-CORS דולק בדפדפן, הכנס את המפתח למעלה ושלח הודעה.
            </div>
        </div>

        <div class="input-panel">
            <div class="max-w-5xl mx-auto flex gap-5">
                <textarea id="uInput" class="flex-1 p-4 border-2 border-gray-100 rounded-xl focus:border-gold outline-none resize-none shadow-sm" rows="1" placeholder="כתוב שאלה או פקודה..."></textarea>
                <button onclick="send()" id="sendBtn" class="gold-btn flex items-center gap-2">
                    <span>שלח</span> <i class="fas fa-bolt"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        async function send() {
            const input = document.getElementById('uInput');
            const key = document.getElementById('apiKey').value || localStorage.getItem('e_k');
            const btn = document.getElementById('sendBtn');
            const status = document.getElementById('status');

            if(!input.value.trim() || !key) return alert("הזן הודעה ומפתח API");
            
            localStorage.setItem('e_k', key);
            const text = input.value;
            addMsg('user', text);
            input.value = "";
            btn.disabled = true;
            status.innerHTML = "<span class='text-yellow-500 font-bold'>מתקשר עם קלוד...</span>";

            try {
                // שליחה ישירה ללא פרוקסי - מחייב תוסף CORS מופעל
                const response = await fetch("https://api.anthropic.com/v1/messages", {
                    method: 'POST',
                    headers: { 
                        'x-api-key': key, 
                        'anthropic-version': '2023-06-01', 
                        'content-type': 'application/json',
                        'dangerously-allow-browser': 'true' 
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 4000,
                        messages: [{ role: "user", content: text }]
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    addMsg('bot', "שגיאת API: " + data.error.message);
                    status.innerHTML = "<span class='text-red-500'>שגיאה במפתח</span>";
                } else {
                    addMsg('bot', data.content[0].text);
                    status.innerHTML = "<span class='text-green-500 font-bold'>מחובר ותקין</span>";
                }
            } catch (e) {
                addMsg('bot', "שגיאת תקשורת. וודא שתוסף ה-CORS מופעל (צבעוני) בדפדפן.");
                status.innerHTML = "<span class='text-red-500 font-bold'>חסימת דפדפן</span>";
            } finally {
                btn.disabled = false;
            }
        }

        function addMsg(role, text) {
            const box = document.getElementById('chatBox');
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        window.onload = () => {
            document.getElementById('apiKey').value = localStorage.getItem('e_k') || "";
        };
    </script>
</body>
</html>
