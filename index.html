<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Elite AI Enterprise</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.2/mammoth.browser.min.js"></script>
    <style>
        :root { --gold: #c5a059; --dark: #2d1b0d; --cream: #f9f7f2; }
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: var(--cream); font-family: sans-serif; }
        
        /* Sidebar fixed to the right */
        .elite-sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 300px; background: var(--dark); color: white; padding: 25px; z-index: 100; box-shadow: -5px 0 15px rgba(0,0,0,0.2); }
        
        /* Main area taking the rest of the space */
        .elite-main { position: fixed; right: 300px; left: 0; top: 0; bottom: 0; display: flex; flex-direction: column; background: var(--cream); }
        
        .elite-header { height: 80px; background: white; border-bottom: 3px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .elite-chat { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
        .elite-input { height: 120px; background: white; border-top: 1px solid #eee; padding: 20px 40px; }
        
        .msg { padding: 15px 20px; border-radius: 12px; max-width: 80%; line-height: 1.6; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .msg-bot { background: #f1ede4; border-right: 5px solid var(--dark); align-self: flex-start; }
        .msg-user { background: white; border-right: 5px solid var(--gold); align-self: flex-end; }
        
        .gold-btn { background: var(--gold); color: white; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <aside class="elite-sidebar">
        <div class="text-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-bold" style="color: var(--gold)">Elite BMS</h1>
            <p class="text-[10px] uppercase tracking-widest opacity-50">Enterprise AI</p>
        </div>

        <div class="mb-8">
            <label class="text-xs text-gold font-bold block mb-2">סקיל פעיל:</label>
            <select id="activeSkill" class="w-full bg-white/10 border border-white/20 p-3 rounded text-sm text-white outline-none">
                <option value="">צ'אט כללי</option>
            </select>
            <button onclick="openSkillModal()" class="w-full mt-4 text-[11px] py-2 border border-dashed border-gold/40 rounded text-gold hover:bg-gold/10">
                + צור סקיל מומחה
            </button>
        </div>

        <nav class="space-y-2">
            <button onclick="location.reload()" class="w-full text-right p-3 rounded hover:bg-white/5 flex items-center gap-3">
                <i class="fas fa-plus text-gold"></i> שיחה חדשה
            </button>
        </nav>
    </aside>

    <div class="elite-main">
        <header class="elite-header shadow-sm">
            <div>
                <h2 class="text-xl font-bold text-gray-800">ממשק עבודה חכם</h2>
                <p id="modeStatus" class="text-[10px] text-gray-400 font-bold uppercase">Mode: General</p>
            </div>
            <div class="flex items-center gap-4 bg-gray-50 p-2 px-4 rounded-xl border">
                <span class="text-xs font-bold text-gray-500">מפתח API:</span>
                <input type="password" id="apiKey" class="text-sm bg-transparent outline-none w-64" placeholder="הכנס מפתח sk-ant-...">
            </div>
        </header>

        <div id="chatBox" class="elite-chat">
            <div class="msg msg-bot">
                <b>שלום יוחנן,</b><br>
                המערכת מוכנה כעת במסך מלא. הכנס את המפתח למעלה והתחל לעבוד.
            </div>
        </div>

        <div class="elite-input">
            <div class="max-w-5xl mx-auto flex gap-4 items-center">
                <input type="file" id="fIn" class="hidden" onchange="document.getElementById('fStat').classList.remove('hidden')">
                <button onclick="document.getElementById('fIn').click()" class="p-4 bg-gray-100 rounded-xl hover:bg-gray-200 text-gray-400">
                    <i class="fas fa-paperclip text-xl"></i>
                </button>
                <textarea id="uInput" class="flex-1 p-3 border-2 border-gray-100 rounded-xl focus:border-gold outline-none resize-none" rows="1" placeholder="כתוב שאלה..."></textarea>
                <button onclick="sendMsg()" class="gold-btn shadow-lg">שלח</button>
            </div>
            <div id="fStat" class="hidden text-[10px] text-gold font-bold mt-1 mr-20">קובץ נטען...</div>
        </div>
    </div>

    <div id="sModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[200] p-4">
        <div class="bg-white rounded-2xl p-8 w-[500px] border-t-8 border-gold shadow-2xl">
            <h3 class="text-2xl font-bold mb-4">יצירת סקיל</h3>
            <input id="sName" class="w-full border p-3 rounded mb-4" placeholder="שם הסקיל">
            <textarea id="sPrompt" class="w-full border p-3 rounded mb-4 h-32" placeholder="הוראות לסקיל..."></textarea>
            <div class="flex justify-end gap-4">
                <button onclick="closeSkillModal()" class="text-gray-400">ביטול</button>
                <button onclick="saveSkill()" class="gold-btn">שמור</button>
            </div>
        </div>
    </div>

    <script>
        // הפונקציות חייבות להיות מוגדרות כאן למעלה
        let skills = JSON.parse(localStorage.getItem('elite_skills_final') || '[]');

        function openSkillModal() { document.getElementById('sModal').classList.remove('hidden'); }
        function closeSkillModal() { document.getElementById('sModal').classList.add('hidden'); }

        function renderSkills() {
            const sel = document.getElementById('activeSkill');
            sel.innerHTML = '<option value="">צ\'אט כללי</option>';
            skills.forEach((s, i) => sel.innerHTML += `<option value="${i}">${s.name}</option>`);
        }

        function saveSkill() {
            const name = document.getElementById('sName').value;
            const prompt = document.getElementById('sPrompt').value;
            if(!name || !prompt) return alert("מלא פרטים");
            skills.push({name, prompt});
            localStorage.setItem('elite_skills_final', JSON.stringify(skills));
            renderSkills();
            closeSkillModal();
        }

        async function sendMsg() {
            const input = document.getElementById('uInput');
            const key = document.getElementById('apiKey').value || localStorage.getItem('claude_key');
            if(!input.value || !key) return alert("הזן הודעה ומפתח");
            localStorage.setItem('claude_key', key);

            appendMsg('user', input.value);
            const userTxt = input.value;
            input.value = "";

            try {
                const res = await fetch("https://cors-anywhere.herokuapp.com/https://api.anthropic.com/v1/messages", {
                    method: 'POST',
                    headers: { 'x-api-key': key, 'anthropic-version': '2023-06-01', 'content-type': 'application/json' },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 4000,
                        messages: [{ role: "user", content: userTxt }]
                    })
                });
                const data = await res.json();
                appendMsg('bot', data.content[0].text);
            } catch (e) {
                appendMsg('bot', "שגיאה. וודא שביקרת ב-https://cors-anywhere.herokuapp.com/corsdemo");
            }
        }

        function appendMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
            div.innerText = text;
            document.getElementById('chatBox').appendChild(div);
            document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
        }

        window.onload = () => {
            renderSkills();
            document.getElementById('apiKey').value = localStorage.getItem('claude_key') || "";
        };
    </script>
</body>
</html>
