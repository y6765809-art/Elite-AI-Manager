<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite BMS | Enterprise AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark: #1a0800; --cream: #fdfaf3; }
        
        /* Layout Fix: 100% of the screen, no scroll on body */
        body, html { margin: 0; padding: 0; height: 100vh; width: 100vw; overflow: hidden; background: var(--cream); }
        
        .main-grid { display: grid; grid-template-columns: 320px 1fr; height: 100vh; width: 100vw; }
        
        /* Sidebar: Solid and Fixed */
        .sidebar { background: var(--dark); color: white; display: flex; flex-direction: column; box-shadow: 4px 0 15px rgba(0,0,0,0.2); }
        
        /* Content Area: Stretches to fill everything else */
        .content-area { display: flex; flex-direction: column; height: 100vh; background: var(--cream); position: relative; }
        
        .chat-container { flex: 1; overflow-y: auto; padding: 3rem; display: flex; flex-direction: column; gap: 1.5rem; }
        
        .input-panel { background: white; border-top: 4px solid var(--gold); padding: 1.5rem 3rem; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }

        /* Messages */
        .msg { max-width: 75%; padding: 1.25rem; border-radius: 1rem; line-height: 1.8; font-size: 1.05rem; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .msg-bot { background: #f1ede4; border-right: 6px solid var(--dark); align-self: flex-start; }
        .msg-user { background: white; border-right: 6px solid var(--gold); align-self: flex-end; }

        /* UI Elements */
        .gold-btn { background: var(--gold); color: white; padding: 0.75rem 2rem; border-radius: 0.5rem; font-weight: bold; transition: 0.2s; }
        .gold-btn:hover { background: #b38f48; transform: translateY(-1px); }
        .gold-btn:active { transform: translateY(0); }
        
        input:focus, textarea:focus { border-color: var(--gold) !important; outline: none; }
    </style>
</head>
<body>

<div class="main-grid">
    <aside class="sidebar p-8">
        <div class="text-center mb-10 border-b border-white/10 pb-6">
            <h1 class="text-3xl font-black" style="color: var(--gold)">ELITE BMS</h1>
            <p class="text-[10px] uppercase tracking-[4px] opacity-40 mt-1">Workspace Manager</p>
        </div>

        <div class="mb-8">
            <label class="text-[11px] font-bold text-gold uppercase mb-3 block">Expert Skills</label>
            <select id="skillSelect" class="w-full bg-white/10 border border-white/20 p-3 rounded-xl text-sm text-white">
                <option value="">General Intelligence</option>
            </select>
            <button onclick="document.getElementById('skillModal').classList.remove('hidden')" class="w-full mt-4 text-[11px] py-2 border border-dashed border-gold/40 rounded-lg text-gold hover:bg-gold/10 font-bold">
                + New Specialist Skill
            </button>
        </div>

        <nav class="flex-1 space-y-4">
            <button onclick="location.reload()" class="w-full text-right p-3 rounded-lg hover:bg-white/5 flex items-center gap-3">
                <i class="fas fa-redo-alt text-gold"></i> Reset Conversation
            </button>
        </nav>

        <div class="mt-auto p-4 bg-black/30 rounded-xl border border-white/5">
            <div class="flex justify-between text-[10px] mb-2 font-bold opacity-60"><span>SESSION COST:</span><span id="cost">$0.00</span></div>
            <div class="w-full bg-gray-700 h-1 rounded-full overflow-hidden"><div id="costBar" class="bg-gold h-full w-0 transition-all duration-700"></div></div>
        </div>
    </aside>

    <main class="content-area">
        <header class="h-20 bg-white border-b-2 border-gray-100 flex items-center justify-between px-10">
            <div>
                <h2 class="text-xl font-bold text-gray-800">Control Panel</h2>
                <div class="flex items-center gap-2 mt-1">
                    <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                    <p id="status" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">System Active</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-gray-50 p-2 px-5 rounded-xl border-2 flex items-center gap-3">
                    <span class="text-xs font-bold text-gray-400">API:</span>
                    <input type="password" id="apiKey" class="bg-transparent w-64 text-sm font-mono" placeholder="sk-ant-...">
                </div>
                <button onclick="testConnection()" class="text-[10px] font-bold text-gold border border-gold/30 px-3 py-1 rounded hover:bg-gold/5">Verify Key</button>
            </div>
        </header>

        <div id="chatBox" class="chat-container">
            <div class="msg msg-bot">
                <b>מערכת Elite BMS מוכנה.</b><br>
                הממשק הוגדר למסך מלא. הזן את מפתח ה-API למעלה והתחל לעבוד. כל הכללים והסקילים יישמרו בדפדפן שלך.
            </div>
        </div>

        <div class="input-panel">
            <div class="max-w-6xl mx-auto flex gap-6 items-end">
                <textarea id="userInput" class="flex-1 p-4 border-2 border-gray-100 rounded-xl resize-none text-lg min-h-[60px]" rows="1" placeholder="Type your command..."></textarea>
                <button onclick="sendMessage()" id="sendBtn" class="gold-btn h-[60px] flex items-center gap-3">
                    <span>Send</span> <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>
</div>

<div id="skillModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-8 w-[500px] border-t-8 border-gold shadow-2xl">
        <h3 class="text-2xl font-bold mb-4">Define Specialist Skill</h3>
        <input id="sName" class="w-full border-2 p-3 rounded-lg mb-4" placeholder="Skill Name (e.g., Accountant)">
        <textarea id="sPrompt" class="w-full border-2 p-3 rounded-lg h-32 mb-6" placeholder="Instructions for Claude..."></textarea>
        <div class="flex justify-end gap-4">
            <button onclick="document.getElementById('skillModal').classList.add('hidden')" class="text-gray-400 font-bold">Cancel</button>
            <button onclick="saveSkill()" class="gold-btn">Create Skill</button>
        </div>
    </div>
</div>

<script>
    let skills = JSON.parse(localStorage.getItem('elite_skills') || '[]');
    let totalCost = 0;

    function saveSkill() {
        const name = document.getElementById('sName').value;
        const prompt = document.getElementById('sPrompt').value;
        if(!name || !prompt) return;
        skills.push({name, prompt});
        localStorage.setItem('elite_skills', JSON.stringify(skills));
        renderSkills();
        document.getElementById('skillModal').classList.add('hidden');
    }

    function renderSkills() {
        const select = document.getElementById('skillSelect');
        select.innerHTML = '<option value="">General Intelligence</option>';
        skills.forEach((s, i) => select.innerHTML += `<option value="${i}">${s.name}</option>`);
    }

    async function sendMessage() {
        const input = document.getElementById('userInput');
        const key = document.getElementById('apiKey').value || localStorage.getItem('claude_key');
        const btn = document.getElementById('sendBtn');
        const skillIdx = document.getElementById('skillSelect').value;

        if(!input.value.trim() || !key) return;
        
        localStorage.setItem('claude_key', key);
        const text = input.value;
        appendMsg('user', text);
        input.value = "";
        btn.disabled = true;

        let systemMsg = "You are an Elite AI Assistant. Be precise, helpful, and professional.";
        if(skillIdx !== "") systemMsg = skills[skillIdx].prompt;

        try {
            const response = await fetch("https://cors-anywhere.herokuapp.com/https://api.anthropic.com/v1/messages", {
                method: 'POST',
                headers: {
                    'x-api-key': key,
                    'anthropic-version': '2023-06-01',
                    'content-type': 'application/json'
                },
                body: JSON.stringify({
                    model: "claude-3-5-sonnet-20240620",
                    max_tokens: 4000,
                    system: systemMsg,
                    messages: [{ role: "user", content: text }]
                })
            });

            const data = await response.json();
            if(data.error) throw new Error(data.error.message);
            
            appendMsg('bot', data.content[0].text);
            updateStats(data.usage);
        } catch (e) {
            appendMsg('bot', "Connection Error. Please ensure you activated the proxy at: https://cors-anywhere.herokuapp.com/corsdemo");
        } finally {
            btn.disabled = false;
        }
    }

    function appendMsg(role, text) {
        const box = document.getElementById('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-bot'}`;
        div.innerText = text;
        box.appendChild(div);
        box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
    }

    function updateStats(usage) {
        const cost = (usage.input_tokens * 0.000003) + (usage.output_tokens * 0.000015);
        totalCost += cost;
        document.getElementById('cost').innerText = `$${totalCost.toFixed(4)}`;
        document.getElementById('costBar').style.width = Math.min(100, totalCost * 100) + "%";
    }

    window.onload = () => {
        renderSkills();
        document.getElementById('apiKey').value = localStorage.getItem('claude_key') || "";
    };
</script>
</body>
</html>
