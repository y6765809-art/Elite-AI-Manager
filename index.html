<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עט סופר Pro | Elite Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;700;900&family=Heebo:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

<style>
    :root {
        --gold: #C8972A; --gold2: #E8B84B; --dark-ink: #1A0800; --cream: #FDFAF3;
    }
    body { font-family: 'Noto Serif Hebrew', serif; background-color: #f4f1ea; }
    
    /* תיקון המסך המלא - ביטול המגבלה שגרמה לזה להיראות קטן */
    .app-wrapper { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
    
    .elite-card { 
        background: white; border-radius: 12px; border-top: 5px solid var(--gold);
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); margin-bottom: 2rem;
    }
    
    .text-panel { height: 500px; overflow-y: auto; border: 1px solid #d4b87a; border-radius: 8px; background: white; padding: 20px; line-height: 2; font-size: 18px; }

    /* עיצוב הטאבים העליונים */
    .mode-tab { padding: 15px 25px; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; font-weight: bold; color: #666; }
    .mode-tab.active { border-bottom-color: var(--gold); color: var(--dark-ink); background: rgba(200,151,42,0.05); }

    /* Landing Page Overlay */
    #landing-overlay { position: fixed; inset: 0; z-index: 9999; background: #0D0400; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
    #landing-overlay.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body class="app-wrapper">

<div id="landing-overlay">
    <div class="text-center">
        <h1 class="text-6xl font-black text-gold mb-4" style="color: #E8B84B">עט סופר</h1>
        <p class="text-gold opacity-50 tracking-[5px] uppercase mb-12">Et Sofer Professional</p>
        <div class="grid grid-cols-2 gap-4 max-w-2xl mx-auto">
            <button onclick="enterApp('torah')" class="p-8 border border-gold/30 rounded-xl hover:bg-gold/10 transition group text-right">
                <span class="text-2xl block mb-2">📜</span>
                <span class="text-xl font-bold text-gold2">לשון קודש תורנית</span>
                <p class="text-xs text-gray-500 mt-2">עריכה לסגנון ספרי קודש, שיוף לשון ופיסוק מדויק</p>
            </button>
            <button onclick="enterApp('heb')" class="p-8 border border-gold/30 rounded-xl hover:bg-gold/10 transition group text-right">
                <span class="text-2xl block mb-2">✍️</span>
                <span class="text-xl font-bold text-gold2">עברית מקצועית</span>
                <p class="text-xs text-gray-500 mt-2">מאמרים, שיעורים וחומר רבני מודרני בעברית רהוטה</p>
            </button>
        </div>
    </div>
</div>

<header class="bg-dark-ink text-white p-4 border-b-4 border-gold flex justify-between items-center px-12" style="background: #1A0800">
    <div class="flex items-center gap-4">
        <div class="w-10 h-10 bg-gold rounded-full flex items-center justify-center text-xl font-bold">✒</div>
        <h1 class="text-2xl font-black">עט סופר <span class="text-gold text-xs ml-2 uppercase">Pro Edition</span></h1>
    </div>
    <div class="flex gap-4">
        <input type="password" id="apiKey" class="bg-white/10 border border-white/20 rounded p-2 text-xs w-64 outline-none focus:border-gold" placeholder="הכנס מפתח קלוד (sk-ant-...)">
        <button onclick="saveKey()" class="bg-gold text-white px-4 py-2 rounded font-bold hover:bg-gold2 transition">שמור מפתח</button>
    </div>
</header>

<main class="flex-1 p-8">
    <div class="w-full flex gap-4 mb-8 border-b border-gray-300">
        <div class="mode-tab active" onclick="switchMode('torah', this)">📜 לשון קודש תורנית</div>
        <div class="mode-tab" onclick="switchMode('heb', this)">✍ עברית מקצועית</div>
    </div>

    <div class="grid grid-cols-12 gap-8">
        <div class="col-span-3">
            <div class="elite-card p-6">
                <h3 class="font-bold border-b mb-4 pb-2"><i class="fas fa-file-upload ml-2 text-gold"></i>העלאת מסמך</h3>
                <div id="dropZone" class="border-2 border-dashed border-gold/30 rounded-lg p-8 text-center cursor-pointer hover:bg-gold/5 transition">
                    <i class="fas fa-cloud-upload-alt text-4xl text-gold/30 mb-4"></i>
                    <p class="text-sm font-bold">גרור קובץ Word לכאן</p>
                    <input type="file" id="fileInput" class="hidden" accept=".docx">
                </div>
                <div id="chapterList" class="mt-6 space-y-2 max-h-96 overflow-y-auto">
                    </div>
            </div>
        </div>

        <div class="col-span-9">
            <div class="elite-card p-6">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold">עיבוד ועריכה חכמה</h3>
                    <div class="flex gap-2">
                        <button onclick="startProcessing()" class="bg-gold text-white px-8 py-3 rounded-lg font-bold shadow-lg hover:scale-105 transition active:scale-95">
                            <i class="fas fa-bolt ml-2"></i>התחל עריכה
                        </button>
                        <button onclick="exportWord()" class="bg-green-700 text-white px-6 py-3 rounded-lg font-bold hover:bg-green-800 transition">
                            <i class="fas fa-file-word ml-2"></i>ייצוא ל-Word
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div>
                        <label class="text-xs font-bold text-gray-500 block mb-2 uppercase">טקסט מקור</label>
                        <div id="sourceText" class="text-panel bg-gray-50"></div>
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 block mb-2 uppercase">תוצאה מעובדת</label>
                        <div id="resultText" contenteditable="true" class="text-panel shadow-inner"></div>
                    </div>
                </div>

                <div id="progressContainer" class="hidden mt-8">
                    <div class="flex justify-between text-xs font-bold mb-2">
                        <span id="statusText">מעבד נתונים...</span>
                        <span id="percentText">0%</span>
                    </div>
                    <div class="w-full bg-gray-200 h-2 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-gold h-full w-0 transition-all duration-500"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    let currentChapters = [];
    let currentResults = {};
    let activeMode = 'torah';

    function enterApp(mode) {
        activeMode = mode;
        document.getElementById('landing-overlay').classList.add('hidden');
    }

    function switchMode(mode, el) {
        activeMode = mode;
        document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
    }

    function saveKey() {
        const key = document.getElementById('apiKey').value;
        if(key) {
            localStorage.setItem('claude_api_key', key);
            alert('המפתח נשמר בהצלחה');
        }
    }

    // --- לוגיקה של הקבצים ---
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFile(e.target.files[0]);

    async function handleFile(file) {
        if(!file) return;
        const arrayBuffer = await file.arrayBuffer();
        const result = await mammoth.extractRawText({arrayBuffer});
        const text = result.value;
        
        // פיצול לפרקים לפי המרקר @@ או לפי פרק/סימן
        currentChapters = text.split(/@@|פרק|סימן/).filter(t => t.trim().length > 10);
        renderChapters();
    }

    function renderChapters() {
        const list = document.getElementById('chapterList');
        list.innerHTML = currentChapters.map((ch, i) => `
            <div class="p-3 border rounded mb-2 hover:bg-gold/5 cursor-pointer transition text-sm flex justify-between items-center" onclick="loadChapter(${i})">
                <span class="truncate ml-2">פרק ${i+1}: ${ch.substring(0, 30)}...</span>
                <i id="status-${i}" class="fas fa-circle text-gray-200 text-[8px]"></i>
            </div>
        `).join('');
    }

    function loadChapter(i) {
        document.getElementById('sourceText').innerText = currentChapters[i];
        document.getElementById('resultText').innerText = currentResults[i] || "";
    }

    // --- לוגיקה של ה-API עם תיקון CORS ---
    async function startProcessing() {
        const key = document.getElementById('apiKey').value || localStorage.getItem('claude_api_key');
        if(!key) return alert("יש להזין מפתח API");

        document.getElementById('progressContainer').classList.remove('hidden');
        
        for(let i=0; i < currentChapters.length; i++) {
            updateProgress(i, currentChapters.length);
            
            const prompt = activeMode === 'torah' 
                ? "אתה עורך תורני מומחה. שכתב את הטקסט הבא ללשון קודש צחה, ללא ארמית מודרנית, עם פיסוק נכון ומראי מקומות בסוגריים:"
                : "שכתב את הטקסט הבא לעברית מקצועית, רהוטה וקולחת:";

            try {
                // שימוש ב-CORS Proxy כגיבוי או ישירות אם מותקן תוסף
                const response = await fetch("https://cors-anywhere.herokuapp.com/https://api.anthropic.com/v1/messages", {
                    method: 'POST',
                    headers: {
                        'x-api-key': key,
                        'anthropic-version': '2023-06-01',
                        'content-type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "claude-3-5-sonnet-20240620",
                        max_tokens: 4000,
                        messages: [{ role: "user", content: prompt + "\n\n" + currentChapters[i] }]
                    })
                });

                const data = await response.json();
                if(data.content) {
                    currentResults[i] = data.content[0].text;
                    document.getElementById(`status-${i}`).classList.remove('text-gray-200');
                    document.getElementById(`status-${i}`).classList.add('text-green-500');
                    if(i === 0) loadChapter(0); // הצגת התוצאה הראשונה מיד
                }
            } catch (error) {
                console.error("Error processing chapter", i, error);
            }
        }
        updateProgress(currentChapters.length, currentChapters.length);
        alert("העריכה הושלמה!");
    }

    function updateProgress(current, total) {
        const pct
