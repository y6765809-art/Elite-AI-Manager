<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Elite AI</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body {margin:0; font-family:sans-serif; background:#f5f5f5;}
.chat {height:80vh; overflow:auto; padding:20px;}
.msg {padding:10px; margin:10px; border-radius:10px;}
.user {background:#d1e7ff;}
.bot {background:#fff;}
</style>
</head>

<body>

<div class="chat" id="chat"></div>

<div style="padding:10px;">
<input id="input" placeholder="כתוב..." style="width:60%;">
<input type="file" id="file">
<button onclick="send()">שלח</button>
<button onclick="upload()">קובץ</button>
</div>

<script>

let skills = JSON.parse(localStorage.getItem('skills') || '[]');

function add(role, text){
  const d = document.createElement("div");
  d.className = "msg " + role;
  d.innerText = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  const text = input.value;
  add("user", text);

  const res = await fetch("http://localhost:3000/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      message: text,
      system: "ענה מקצועי"
    })
  });

  const data = await res.json();
  add("bot", data.content[0].text);
}

async function upload(){
  const f = file.files[0];
  const fd = new FormData();
  fd.append("file", f);

  const res = await fetch("http://localhost:3000/upload", {
    method:"POST",
    body: fd
  });

  const data = await res.json();
  add("bot", data.content[0].text);
}

</script>

</body>
</html>
